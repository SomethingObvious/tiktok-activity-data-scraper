[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "RET", "PIE", "PT", "PTH", "ARG", "RUF", "S"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"test*.py" = ["S", "ARG", "PT"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true

[tool.bandit]
skips = ["B101"]
